services:
  - type: web
    name: stockflow
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true   # Render auto-generates a secure random value
      - key: DATABASE_URL
        fromDatabase:
          name: stockflow-db
          property: connectionString

databases:
  - name: stockflow-db
    plan: free
